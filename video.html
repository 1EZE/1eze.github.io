<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
	 <meta http-equiv="X-UA-Compatible" content="IE=edge">
	 <meta name="viewport" content="width=device-width, initial-scale=1.0">
	 <link rel="stylesheet" href="css/video.css">
	  </head>
	  <body>
	 <h3 class="heading"> My Projects </h3> 
	 
	  <div class="container">
	  
	  <div class="main-video">
	       <div class="video">
		   <video src="videos/1.mp4" controls muted autoplay></video>
		   <h3 class="title">01.Face landmarks</h3>
	   </div>
	  </div>
	  
	  <div class="video-list">
	     <div class="vid active"> 
		     <video src="videos/1.mp4" muted></video>
		     <h3 class="title">01.Face landmarks</h3>
		 </div>
		 <div class="vid"> 
		     <video src="videos/2.mp4" muted></video>
		     <h3 class="title">02.Pikachu design</h3>
		 </div>
		  <div class="vid"> 
		     <video src="videos/3.mp4" muted></video>
		     <h3 class="title">03.Snake game</h3>
		 </div>
		  <div class="vid"> 
		     <video src="videos/4.mp4" muted></video>
		     <h3 class="title">04.AI hand tracking</h3>
		 </div>
		  <div class="vid"> 
		     <video src="videos/5.mp4" muted></video>
		     <h3 class="title">05.Netflix logo</h3>
		 </div>
		 <div class="vid"> 
		     <video src="videos/6.mp4" muted></video>
		     <h3 class="title">06.Graphic designing</h3>
		 </div>
	  </div>
	  
	  </div>
	  
	  <script>
	  
	  let listVideo = document.querySelectorAll('.video-list .vid');
	  let mainVideo = document.querySelector('.main-video video');
	  let title = document.querySelector('.main-video .title');
	  
	  listVideo.forEach(video =>{
	    video.onclick = () =>{
		       listVideo.forEach(vid => vid.classList.remove('active'));
			   video.classList.add('active');
			   if(video.classList.contains('active')){
			     let src = video.children[0].getAttribute('src');
				 mainVideo.src = src;
				 let text = video.children[1].innerHTML;
				 title.innerHTML = text;
			   };
		};
	  });
	  
	  </script>
	  
	  </body>
	  </html>
